<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Game Server Manager</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --card: #ffffff;
      --text: #1f2329;
      --muted: #646a73;
      --primary: #1677ff;
      --border: #e5e6eb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(31, 35, 41, 0.06);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(22, 119, 255, 0.12);
      color: var(--primary);
      font-size: 12px;
      margin-top: 12px;
    }
    .info-grid {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .info-item {
      padding: 12px 14px;
      border-radius: 12px;
      background: #fafafa;
      border: 1px solid var(--border);
    }
    .info-item strong {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .info-item span {
      font-size: 14px;
      word-break: break-all;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 15px;
      background: var(--primary);
      color: #fff;
      margin-top: 12px;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-all;
      background: #0f172a;
      color: #e2e8f0;
      padding: 12px;
      border-radius: 12px;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Game Server Manager</h1>
      <p>APK 壳已启动。当前为内置占位页面，后续请通过热更新替换整个 <code>app/</code> 业务目录。</p>
      <div class="badge">Native Shell Ready</div>
    </div>

    <div class="card">
      <h1 style="font-size:18px;">运行信息</h1>
      <div class="info-grid" id="info-grid">
        <div class="info-item"><strong>Shell Version</strong><span id="shell-version">-</span></div>
        <div class="info-item"><strong>Web Version</strong><span id="web-version">-</span></div>
        <div class="info-item"><strong>Entry URL</strong><span id="entry-url">-</span></div>
      </div>
      <button id="btn-ping">测试 NativeBridge</button>
      <pre id="output">等待检测...</pre>
    </div>
  </div>

  <script src="js/native-bridge.js"></script>
  <script>
    async function bootstrap() {
      const output = document.getElementById("output");
      try {
        const shell = await AppNative.getShellInfo();
        const version = await AppNative.hotupdate.getVersion();
        if (shell.code === 0) {
          document.getElementById("shell-version").textContent = shell.data.shellVersion + " / " + shell.data.appVersion;
        }
        if (version.code === 0) {
          document.getElementById("web-version").textContent = version.data.current.version;
          document.getElementById("entry-url").textContent = version.data.entryUrl;
        }
        output.textContent = JSON.stringify({ shell: shell.data, web: version.data }, null, 2);
      } catch (error) {
        output.textContent = String(error);
      }
    }

    document.getElementById("btn-ping").addEventListener("click", async function () {
      const output = document.getElementById("output");
      try {
        const result = await AppNative.ping();
        output.textContent = JSON.stringify(result, null, 2);
      } catch (error) {
        output.textContent = String(error);
      }
    });

    bootstrap();
  </script>
</body>
</html>
